<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>AI Automation Consulting | Heuristic Consulting</title>

  <meta name="description"
    content="AI automation consulting, RAG systems, and AI agent implementation for organizations that require production reliability, governance, and measurable outcomes." />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- FAQ Schema -->
  <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "What does a typical engagement look like?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "We start with an objective and a current-state map, then define success criteria, build a pilot, harden it with monitoring, access controls, and QA, and deploy."
      }
    },
    {
      "@type": "Question",
      "name": "Do you work with existing tools like n8n, CRMs, Google Workspace, or Microsoft 365?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. We integrate with your existing stack and standardize inputs and outputs so systems remain maintainable by your internal team."
      }
    },
    {
      "@type": "Question",
      "name": "How do you control hallucinations and AI risk?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "We use retrieval-augmented generation tied to approved sources, constrained tool usage, validation steps, and human approval loops where appropriate."
      }
    },
    {
      "@type": "Question",
      "name": "Can you provide a white paper before a call?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. Request it through the website form and we will send the current edition."
      }
    }
  ]
}
  </script>

  <!-- Organization Schema -->
  <script type="application/ld+json">
{

</head>

<body>

  <!-- Netlify Forms: register framework-download -->
  <form name="framework-download" method="POST" data-netlify="true" hidden>
    <input type="hidden" name="form-name" value="framework-download" />
    <input type="hidden" name="request_type" value="framework_download" />
    <input type="text" name="bot-field" />

    <input type="text" name="first_name" />
    <input type="text" name="last_name" />
    <input type="text" name="company" />
    <input type="email" name="email" />
    <input type="tel" name="phone_area" />
    <input type="tel" name="phone_number" />
    <input type="text" name="timeline" />
    <input type="text" name="lead_summary" />
  </form>

  <!-- Netlify Forms: register contact-form -->
  <form name="contact-form" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="contact-form" />
    <input type="hidden" name="request_type" value="strategy_call" />
    <input type="text" name="bot-field" />

    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="tel" name="phone_area" />
    <input type="tel" name="phone_number" />
    <textarea name="message"></textarea>
    <input type="checkbox" name="sms_opt_in" />
    <input type="text" name="lead_summary" />
  </form>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>

</body>
